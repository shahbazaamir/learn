server:
  port: 9873

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/org
    username: zainabfirdaus
    password:
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  
  batch:
    job:
      enabled: true
    jdbc:
      initialize-schema: always

logging:
  level:
    org.springframework.batch: DEBUG
    org.springframework.jdbc: DEBUG
    org.springframework.batch.core.repository.support: DEBUG
    org.springframework.batch.core.repository.dao: DEBUG